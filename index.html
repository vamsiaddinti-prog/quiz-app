<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Java Outputs</title>
</head>

<body>
    <script>
        document.write("Output using document.write()");

        console.log("Output using console.log()");

        alert("Output using alert()");
    </script>

    <h2 id="output"></h2>
    <script>
        document.getElementById("output").innerText = "Output using innerText";
    </script>
</body>

</html>
